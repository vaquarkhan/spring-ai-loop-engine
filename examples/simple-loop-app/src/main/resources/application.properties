spring.ai.loop.enabled=true
spring.ai.loop.soft-max-rounds=5
spring.ai.loop.hard-max-rounds=10
spring.ai.loop.block-duplicate-failed-actions=true
spring.ai.loop.mcp.generate-cursor-config=true
spring.ai.loop.mcp.cursor-config-path=.cursor/mcp.json
spring.ai.loop.mcp.bastion-enabled=true
spring.ai.loop.agui.enabled=true
spring.ai.loop.a2a.enabled=true
spring.ai.loop.integrity.enabled=true
spring.ai.loop.observability.enabled=true
spring.main.web-application-type=reactive
server.port=8080
logging.level.io.github.vaquarkhan.loopengine=INFO
